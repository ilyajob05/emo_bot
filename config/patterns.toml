# ─── Detection Thresholds ───────────────────────────────────────────────────

[thresholds]
# Repeated bot questions: Jaccard similarity to consider questions "same"
repeated_question_similarity = 0.45

# No progress: minimum overlap to detect stagnation
no_progress_user_overlap = 0.3
no_progress_bot_overlap = 0.15
no_progress_window = 6

# Emotion escalation: minimum increase to trigger
escalation_intensity_delta = 0.5

# Profanity: immediate escalation (no delta needed, binary trigger)
profanity_auto_escalate = true

# Publicity threat: weight multiplier for combined scoring
publicity_weight = 1.5

# Repeated contact: boost severity score when detected
repeated_contact_severity_boost = 0.3

# Vulnerability: flag for priority routing
vulnerability_priority_flag = true

# Caps lock / shouting detection: fraction of uppercase chars to trigger
caps_ratio_threshold = 0.7
caps_min_length = 10

# Repeated punctuation: number of consecutive !!! or ??? to detect emphasis
repeated_punct_threshold = 3

# Question detection regex (identifies bot messages that are questions)
question_pattern = "[?？]|уточн|напиш|укаж|подскаж|сообщ|пришл|назов|provide|specify|send|tell me|what is|could you|can you|please share|please provide"

