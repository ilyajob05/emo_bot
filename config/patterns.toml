# ─── Profanity / Insults ────────────────────────────────────────────────────
# Explicit profanity as a separate signal — often indicates the highest
# escalation level.
#
# ⚠️  IMPORTANT: Asterisks in substrings are LITERAL characters.
#     "бл*" matches input "бл*дь" but NOT "блядь".
#     We therefore include BOTH censored forms (with *) and uncensored
#     root prefixes. For complex patterns, use regex_ru / regex_en.

[profanity]
lemmas_ru = [
    # --- mild insults (spaCy can lemmatize these) ---
    "дурак", "идиот", "дебил", "тупой", "тупица",
    "кретин", "баран", "урод", "козёл", "козел",
    "придурок", "олух", "лох", "чмо",
    # --- stronger insults ---
    "долбоёб", "долбоеб", "мудак", "сука", "тварь",
    "ублюдок", "гнида", "падла", "скотина", "свинья",
]
substrings_ru = [
    # ── Uncensored root prefixes ──
    # These catch the actual words when typed without censorship.
    # Short roots like "бля" also cover longer forms: блять, бляди, etc.
    "бля",              # блять, бляди, блядь, блядский
    "пизд",             # пиздец, пиздёж, пиздеть
    "ебан",             # ебаный, ебанутый
    "ебат",             # ебать
    "ёбан",             # ёбаный (ё-form of ебан)
    "ебал",             # ебал, ебала, заебали
    "хуй",              # хуйня, хуёвый — literal form
    "хуе",              # хуевый, хуесос (е-form)
    "хуё",              # хуёвый (ё-form)
    "нахуй",            # пошёл нахуй, иди нахуй
    "нахер",            # иди нахер
    "нахрен",           # иди нахрен
    "похуй",            # мне похуй
    "похер",            # мне похер
    "охуе",             # охуеть, охуели
    "заеб",             # заебал, заебали
    "заёб",             # заёбал (ё-form)
    "отъеб",            # отъебись
    "отьеб",            # отьебись (without ъ — common misspelling)
    "долбоёб",          # explicit (also in lemmas, substring catches inflections)
    "долбоеб",          # е-form
    "сучар",            # сучара
    "сучк",             # сучка
    "пидор",            # пидор, пидорас
    "пидар",            # пидарас (misspelling variant)
    # ── Censored forms (with *, #, @ etc.) ──
    # These match when users self-censor: "бл*дь", "х*й", "п*здец"
    "бл*д", "бл*т",    # бл*дь, бл*ть
    "бл#д", "бл#т",    # бл#дь, бл#ть
    "бл@д",            # бл@дь
    "х*й", "х*е",      # х*й, х*йня, х*евый
    "х#й",             # х#й
    "х@й",             # х@й
    "п*зд",            # п*здец
    "п#зд",            # п#здец
    "п@зд",            # п@здец
    "е*ать", "е*ан",   # е*ать, е*аный
    "ё*ан",            # ё*аный
    "е#ан",            # е#аный
    "на*уй", "на*ер",  # на*уй, на*ер
    "на#уй",           # на#уй
    "пош*л",           # пош*л (censored)
    "пош#л",           # пош#л (censored)
    # ── Mild / borderline profanity ──
    "какого хрена", "какого чёрта", "какого черта",
    "какого фига", "какого дьявола",
    "что за хрень",
    "чёрт побери", "черт побери",
    "чёрт возьми", "черт возьми",
    "блин,", "блин!",  # trailing punctuation to reduce false positives
]

# ── Regex patterns for profanity (true wildcard matching) ──
# Use these in the detector code with re.search(pattern, text, re.IGNORECASE).
# They handle arbitrary censoring characters: бл*дь, бл**дь, бл@дь, etc.
regex_ru = [
    'бл[яЯ*#@!._]+[дтДТ]',       # бл*дь, бл**ть, бл@дь, бляд, блят
    'х[уУ*#@!._]+[йеёЙЕЁ]',      # х*й, х**й, х@й, хуй, хуе, хуё
    'п[иИ*#@!._]+зд',             # п*здец, п**здец, пизд
    '[еёЕЁ*#@!._]*б[аА][нтлНТЛ]', # е*ать, е*аный, ебал, ёбан
    'на[*#@!._]+[уехУЕХ][йрЙР]?', # на*уй, на*ер, на**й
    'за[еёЕЁ*#@!._]+б',           # заебал, заёбал, за*бал
    'пош[*#@!._]+л',               # пош*л, пош**л
    'о[хХ*#@!._]+[еёуЕЁУ]',       # ох*еть, ох*ели
]
regex_en = [
    'f[*#@!._]+[ck]+',            # f**k, f*ck, f@ck, f#ck
    'sh[*#@!._]+t',               # sh*t, sh**t, sh#t
    'bull\\s*sh[*#@!._]*[ti]t?',  # bullsh*t, bull sh*t, bullshit
    'a[*#@!._]+hole',             # a**hole, a*hole
    'b[*#@!._]+tch',              # b*tch, b**tch
    'd[*#@!._]+ck',               # d*ck, d**ck
    'motherf',                     # motherfucker, motherf***er
]

lemmas_en = [
