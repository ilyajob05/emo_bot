# Pattern detector configuration.
# Customize keywords, thresholds, and detection parameters
# for your specific domain and language.
#
# Keywords use spaCy lemma forms — one entry covers all inflected forms.
# For example, "жалоба" matches "жалобу", "жалобой", "жалобы".
#
# Substrings are matched as-is (case-insensitive) — use for multi-word
# phrases that spaCy may not lemmatize well.
#
# ⚠️  PROFANITY NOTE: Asterisks in substrings are LITERAL characters.
# "бл*" matches "бл*дь" but NOT "блядь". For profanity detection,
# we provide BOTH the censored and the root/uncensored forms.
# The detector code can also use `regex_ru` / `regex_en` for patterns
# that need true wildcard matching (see [profanity] section).

